<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas de Presença – Next Level</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --brown-dark: #2a1a0a;
  --brown-mid:  #3d2510;
  --gold:       #c9a84c;
  --gold-light: #e8c96a;
  --white:      #ffffff;
  --black:      #111111;
  --gray-light: #f5f5f5;
  --border:     #cccccc;
  --row-alt:    #fafafa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; background: #e8e4df; min-height: 100vh; padding: 0; }

/* TOP BAR */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--brown-dark);
  border-bottom: 2px solid var(--gold);
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px; gap: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.4);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 16px; color: var(--white); letter-spacing: 2px; text-transform: uppercase; }
.topbar-title span { color: var(--gold); }
.topbar-center { flex: 1; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 13px; color: rgba(255,255,255,.6); letter-spacing: 1px; }
.page-indicator { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; color: var(--gold); white-space: nowrap; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.btn { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: .8px; text-transform: uppercase; padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; }
.btn:hover { opacity: .82; }
.btn-gold { background: var(--gold); color: #fff; }
.btn-dark { background: #555; color: #fff; }
.btn-outline { background: transparent; color: var(--gold); border: 1.5px solid var(--gold); }
.btn-nav {
  width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--gold);
  background: transparent; color: var(--gold); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
}
.btn-nav:hover { background: var(--gold); color: var(--brown-dark); }
.btn-nav:disabled { opacity: .25; cursor: default; }

/* CONFIG PANEL */
.config-panel {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200;
  background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center;
}
.config-box {
  background: var(--white); border-radius: 8px; padding: 36px 40px;
  max-width: 520px; width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,.4);
}
.config-box h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 22px; color: var(--brown-dark); margin-bottom: 6px; }

/* LOADING */
.loading-screen {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 150;
  background: var(--brown-dark); display: none;
  flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.loading-screen .spinner {
  width: 48px; height: 48px; border: 4px solid rgba(201,168,76,.2);
  border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Outros estilos (sheet, table, etc.) - mantidos do original */
.sheet { max-width: 900px; margin: 24px auto; background: var(--white); border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,.12); }
.sheet-header { background: linear-gradient(135deg, var(--brown-dark) 0%, var(--brown-mid) 60%, #5a3a18 100%); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 3px solid var(--gold); }
.logo-img { height: 62px; width: 62px; object-fit: contain; border-radius: 4px; }
.meta-band { background: var(--gold); padding: 10px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 24px; }
.meta-value { flex: 1; font-weight: 600; font-size: 13px; border-bottom: 1.5px solid rgba(0,0,0,.2); padding: 2px 4px; outline: none; background: transparent; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead th { background: var(--brown-dark); color: var(--white); font-weight: 700; font-size: 11px; padding: 8px 6px; text-align: center; }
.cell-input { width: 100%; border: none; background: transparent; padding: 2px 4px; outline: none; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,0,0,.2); cursor: pointer; }
.dot.active { background: var(--gold); transform: scale(1.3); }
</style>
</head>
<body>

<!-- CONFIG PANEL -->
<div class="config-panel" id="configPanel" style="display:none;">
  <div class="config-box">
    <h2>🔄 Recarregar Planilha</h2>
    <button class="btn btn-gold" style="width:100%; padding:12px; font-size:15px;" onclick="loadSheet()">Atualizar Dados</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <p>Carregando fichas...</p>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">NEXT <span>LEVEL</span></span>
  </div>
  <div class="topbar-center">
    <span id="topbarSubtitle">Fichas de Presença</span>
  </div>
  <div class="topbar-right">
    <button class="btn-nav" id="btnPrev" onclick="navigate(-1)" disabled>‹</button>
    <span class="page-indicator" id="pageIndicator">—</span>
    <button class="btn-nav" id="btnNext" onclick="navigate(1)" disabled>›</button>
    <button class="btn btn-outline" onclick="window.print()">🖨 Imprimir</button>
    <button class="btn btn-dark" onclick="showConfig()">⚙</button>
  </div>
</div>

<div class="pages-wrap" id="pagesWrap"></div>

<div class="bottom-nav" id="bottomNav" style="display:none;">
  <button class="btn-nav" onclick="navigate(-1)" id="btnPrev2" disabled>‹</button>
  <div class="page-dots" id="pageDots"></div>
  <button class="btn-nav" onclick="navigate(1)" id="btnNext2" disabled>›</button>
</div>

<script>
// ====================== CONFIGURAÇÃO ======================
const DEFAULT_SHEET_ID = "1dF3AvfVU-m-TvEgIbkX7bMqu91RPhCKbMqm0t2q6iwU";
const DEFAULT_SHEET_TAB = "Ficha 1";

// ====================== LOGOS (vazios) ======================
// Cole os base64 aqui quando quiser
const LOGO_MINIST = '';  
const LOGO_SAVE   = '';  

let pages = [];
let current = 0;

// ====================== AUTO LOAD ======================
window.onload = function() {
  document.getElementById('loadingScreen').style.display = 'flex';
  loadDefaultSheet();
};

async function loadDefaultSheet() {
  const id = DEFAULT_SHEET_ID;
  const tab = DEFAULT_SHEET_TAB;

  const urls = [
    `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`,
    `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json`
  ];

  for (const url of urls) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const text = await res.text();
      
      let jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)?.[1] 
                 || text.match(/setResponse\(([\s\S]*)\)/)?.[1] 
                 || text;
      
      jsonStr = jsonStr.replace(/\s*\)\s*;?\s*$/, '').trim();
      const json = JSON.parse(jsonStr);

      if (json.table && json.table.rows && json.table.rows.length > 0) {
        parseAndRender(json);
        return;
      }
    } catch(e) { console.error(e); }
  }

  document.getElementById('loadingScreen').style.display = 'none';
  alert('Erro ao carregar. Verifique se a planilha está pública.');
}

async function loadSheet() {
  document.getElementById('loadingScreen').style.display = 'flex';
  await loadDefaultSheet();
}

function showConfig() {
  document.getElementById('configPanel').style.display = 'flex';
}

// ====================== FUNÇÕES PRINCIPAIS (do seu original) ======================
function parseAndRender(json) {
  const cols = json.table.cols.map(c => (c.label || c.id || '').trim().toLowerCase());
  const rows = json.table.rows || [];

  const normalize = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
  const colsNorm = cols.map(normalize);

  const ci = {
    aluno:     colsNorm.findIndex(c => c.includes('aluno')),
    professor: colsNorm.findIndex(c => c.includes('professor')),
    materia:   colsNorm.findIndex(c => c.includes('materia')),
    horario:   colsNorm.findIndex(c => c.includes('horario')),
    monitor:   colsNorm.findIndex(c => c.includes('monitor')),
  };

  if (ci.aluno === -1) ci.aluno = 0;
  if (ci.professor === -1) ci.professor = 1;
  if (ci.materia === -1) ci.materia = 2;
  if (ci.horario === -1) ci.horario = 3;
  if (ci.monitor === -1) ci.monitor = 4;

  const groups = new Map();
  for (const row of rows) {
    const cell = (i) => (i >= 0 && row.c[i] && row.c[i].v != null) ? String(row.c[i].v).trim() : '';
    const materia = cell(ci.materia) || '(sem matéria)';
    const aluno = cell(ci.aluno);
    if (!aluno) continue;
    if (aluno.toLowerCase().includes('aluno') || aluno.toLowerCase() === 'nome') continue;

    if (!groups.has(materia)) {
      groups.set(materia, {
        materia,
        professor: cell(ci.professor),
        horario: cell(ci.horario),
        monitor: cell(ci.monitor),
        alunos: []
      });
    }
    groups.get(materia).alunos.push(aluno);
  }

  renderPages([...groups.values()]);
}

function renderPages(groups) {
  pages = groups;
  current = 0;
  const wrap = document.getElementById('pagesWrap');
  wrap.innerHTML = '';
  const dots = document.getElementById('pageDots');
  dots.innerHTML = '';

  groups.forEach((g, idx) => {
    const page = document.createElement('div');
    page.className = 'page' + (idx === 0 ? ' active' : '');
    page.id = 'page-' + idx;
    page.innerHTML = buildSheetHTML(g, idx);
    wrap.appendChild(page);

    const dot = document.createElement('button');
    dot.className = 'dot' + (idx === 0 ? ' active' : '');
    dot.onclick = () => goTo(idx);
    dots.appendChild(dot);
  });

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('bottomNav').style.display = 'flex';
  document.getElementById('topbarSubtitle').textContent = groups.length + ' matéria' + (groups.length > 1 ? 's' : '');
  updateNav();
}

function buildSheetHTML(g, idx) {
  let rows = '';
  const count = Math.max(g.alunos.length, 10);
  for (let i = 0; i < count; i++) {
    const name = g.alunos[i] || '';
    rows += `
    <tr ${i % 2 === 1 ? 'style="background:var(--row-alt)"' : ''}>
      <td class="col-num">${i + 1}</td>
      <td class="col-name">${escHtml(name)}</td>
      <td class="col-center"><input class="cell-input center" type="text" maxlength="4" placeholder="—"></td>
      <td class="col-center"><input class="cell-input center" type="text" maxlength="4" placeholder="—"></td>
      <td class="col-center"><input class="cell-input center" type="text" maxlength="4" placeholder="—"></td>
      <td class="col-center"><input class="cell-input center" type="text" maxlength="4" placeholder="—"></td>
      <td class="col-center"><input class="cell-input center" type="text" maxlength="3" placeholder="0"></td>
      <td class="col-center"><input class="cell-input center" type="text" maxlength="6" placeholder="—"></td>
      <td class="col-result"><input class="cell-input center" type="text" placeholder="Aprovado"></td>
    </tr>`;
  }

  return `
  <div class="sheet">
    <div class="sheet-header">
      <img class="logo-img" src="data:image/jpeg;base64,${LOGO_MINIST}" alt="Logo">
      <div class="header-center">
        <div class="org-sub">Save the Nations Brasil</div>
        <div class="next-level-badge">NEXT LEVEL<span class="sub">MINISTÉRIO DE ENSINO</span></div>
      </div>
      <img class="logo-img" src="data:image/png;base64,${LOGO_SAVE}" alt="Logo">
    </div>
    <div class="meta-band">
      <div class="meta-field"><span class="meta-label">Disciplina:</span><input class="meta-value" value="${escHtml(g.materia)}"></div>
      <div class="meta-field"><span class="meta-label">Sala / Horário:</span><input class="meta-value" value="${escHtml(g.horario)}"></div>
      <div class="meta-field"><span class="meta-label">Professor(a):</span><input class="meta-value" value="${escHtml(g.professor)}"></div>
      <div class="meta-field"><span class="meta-label">Monitor(a):</span><input class="meta-value" value="${escHtml(g.monitor)}"></div>
    </div>
    <div class="table-wrap">
      <table><thead><tr>
        <th>Nº</th><th class="col-name">ALUNO(A)</th>
        <th><input class="date-header" placeholder="Data 1"></th>
        <th><input class="date-header" placeholder="Data 2"></th>
        <th><input class="date-header" placeholder="Data 3"></th>
        <th><input class="date-header" placeholder="Data 4"></th>
        <th>Total Faltas</th><th>Nota Prova</th><th>Resultado</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div>
    <div class="add-row-strip">
      <button class="btn btn-gold" onclick="addRowToPage(${idx})">+ Aluno</button>
    </div>
    <div class="sheet-footer">Save the Nations Brasil · Ficha ${idx + 1} / ${pages.length}</div>
  </div>`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function goTo(idx) {
  if (idx < 0 || idx >= pages.length) return;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
  current = idx;
  document.getElementById('page-' + idx).classList.add('active');
  document.querySelectorAll('.dot')[idx].classList.add('active');
  updateNav();
}
function navigate(dir) { goTo(current + dir); }
function updateNav() {
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === pages.length - 1;
  document.getElementById('btnPrev2').disabled = current === 0;
  document.getElementById('btnNext2').disabled = current === pages.length - 1;
  document.getElementById('pageIndicator').textContent = (current + 1) + ' / ' + pages.length;
}
function addRowToPage(idx) {
  const tbody = document.getElementById('page-' + idx).querySelector('tbody');
  const rowNum = tbody.children.length + 1;
  const tr = document.createElement('tr');
  tr.innerHTML = `<td class="col-num">${rowNum}</td><td class="col-name"><input class="cell-input" placeholder="Nome do aluno"></td><td class="col-center"><input class="cell-input center" maxlength="4" placeholder="—"></td><td class="col-center"><input class="cell-input center" maxlength="4" placeholder="—"></td><td class="col-center"><input class="cell-input center" maxlength="4" placeholder="—"></td><td class="col-center"><input class="cell-input center" maxlength="4" placeholder="—"></td><td class="col-center"><input class="cell-input center" maxlength="3" placeholder="0"></td><td class="col-center"><input class="cell-input center" maxlength="6" placeholder="—"></td><td class="col-result"><input class="cell-input center" placeholder="Aprovado"></td>`;
  tbody.appendChild(tr);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
});

window.addEventListener('beforeprint', () => document.querySelectorAll('.page').forEach(p => p.classList.add('active')));
</script>
</body>
</html>
