<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Level — Registro de Presença e Notas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 20px; }
  .container { max-width: 750px; margin: 0 auto; }

  .header { background: #1A3A5C; color: white; padding: 20px 24px; border-radius: 12px 12px 0 0; }
  .header h1 { font-size: 18px; font-weight: bold; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
  .gold-bar { height: 5px; background: #E8A020; }

  .card { background: white; padding: 20px 24px; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
  .card + .card { border-top: 1px solid #eee; }

  .section-title { background: #1A3A5C; color: white; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; margin-bottom: 14px; }

  .row { display: flex; gap: 14px; margin-bottom: 12px; }
  .field { flex: 1; }
  .field label { display: block; font-size: 12px; font-weight: bold; color: #2E6EA6; margin-bottom: 4px; }
  .field select, .field input { width: 100%; padding: 9px 11px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; background: #EBF3FB; color: #333; outline: none; }
  .field select:focus, .field input:focus { border-color: #2E6EA6; background: #fff; }

  .alunos-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 6px; }
  .alunos-header span { font-size: 11px; font-weight: bold; color: white; background: #2E6EA6; padding: 6px 8px; border-radius: 4px; text-align: center; }
  .header-aula { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 6px !important; }
  .header-label { font-size: 11px; font-weight: bold; color: white; }
  .header-date { width: 100%; font-size: 10px; padding: 2px 3px; border: 1px solid rgba(255,255,255,0.5); border-radius: 4px; background: rgba(255,255,255,0.15); color: white; cursor: pointer; text-align: center; }
  .header-date::-webkit-calendar-picker-indicator { filter: invert(1); width: 12px; height: 12px; }
  .alunos-header span:first-child { text-align: left; padding-left: 10px; }

  .aluno-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 6px; position: relative; }
  .scroll-tabela { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .scroll-tabela-inner { min-width: 580px; }
  .aluno-row input, .aluno-row select { width: 100%; padding: 7px 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 12px; background: #F5FAFF; }
  .aluno-row:nth-child(even) input, .aluno-row:nth-child(even) select { background: #EBF3FB; }

  .btn-cadastrar { width: 100%; padding: 14px; background: #1E8035; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 4px; letter-spacing: 0.5px; }
  .btn-cadastrar:hover { background: #165f27; }
  .btn-cadastrar:disabled { background: #aaa; cursor: not-allowed; }

  .footer { background: #f8f8f8; border: 1px solid #ddd; border-top: none; border-radius: 0 0 12px 12px; padding: 10px 24px; font-size: 11px; color: #888; text-align: center; }

  .msg { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 16px; display: none; }
  .msg.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
  .msg.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }

  .loading { display: none; text-align: center; color: #2E6EA6; font-size: 13px; margin-top: 10px; }


  .aluno-row { position: relative; }
  .sugestoes { position: absolute; z-index: 1000; background: white; border: 1px solid #2E6EA6; border-top: none; border-radius: 0 0 6px 6px; max-height: 180px; overflow-y: auto; width: 100%; left: 0; top: 100%; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  .sugestoes div { padding: 8px 10px; font-size: 12px; cursor: pointer; }
  .sugestoes div:hover { background: #EBF3FB; color: #1A3A5C; font-weight: bold; }
  .aluno-col-nome { position: relative; }

  @media(max-width: 600px) {
    .row { flex-direction: column; gap: 8px; }
    .card { padding: 14px 12px; }
    .alunos-header span { font-size: 10px; padding: 5px 4px; }
    .aluno-row input, .aluno-row select { font-size: 11px; padding: 6px 4px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>📋 Registro de Presença e Notas</h1>
    <p>Next Level · Gestão Acadêmica</p>
  </div>
  <div class="gold-bar"></div>

  <!-- IDENTIFICAÇÃO -->
  <div class="card">
    <div class="section-title">▸ IDENTIFICAÇÃO DA TURMA</div>
    <div class="row">
      <div class="field">

      </div>
      <div class="field">
        <label>Matéria *</label>
        <select id="materia">
          <option value="">Selecione o curso primeiro</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Professor *</label>
        <select id="professor">
          <option value="">Selecione...</option>
          <option>Deyse</option><option>Eli</option><option>Euzzy</option>
          <option>Fabio</option><option>Isabel</option><option>Luã</option>
          <option>Pr. Édson</option><option>Pra Carol</option>
          <option>Pra Priscila</option><option>Raphaela</option><option>Vanderlei</option>
        </select>
      </div>
      <div class="field">
        <label>Monitor</label>
        <select id="monitor">
          <option value="">Selecione...</option>
          <option>Bia</option><option>Branco</option><option>João Victor</option><option>Carol Rodrigues</option>
          <option>Creuza</option><option>Fernanda</option><option>Gabriela</option>
          <option>Mariza</option><option>Naty</option><option>Rodolpho</option>
          <option>Suyany</option><option>Yasmin</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ALUNOS -->
  <div class="card">
    <div class="section-title">▸ REGISTRO DOS ALUNOS</div>
    <div class="scroll-tabela">
      <div class="scroll-tabela-inner">
        <div class="alunos-header">
          <span>Nome do Aluno</span>
          <span class="header-aula" id="hAula1">
            <div class="header-label">Aula 1</div>
            <input type="date" class="header-date" id="dataAula1" onchange="atualizarHeaderAula(1)">
          </span>
          <span class="header-aula" id="hAula2">
            <div class="header-label">Aula 2</div>
            <input type="date" class="header-date" id="dataAula2" onchange="atualizarHeaderAula(2)">
          </span>
          <span class="header-aula" id="hAula3">
            <div class="header-label">Aula 3</div>
            <input type="date" class="header-date" id="dataAula3" onchange="atualizarHeaderAula(3)">
          </span>
          <span class="header-aula" id="hAula4">
            <div class="header-label">Aula 4</div>
            <input type="date" class="header-date" id="dataAula4" onchange="atualizarHeaderAula(4)">
          </span>
          <span>Nota Prova</span>
        </div>
        <div id="lista-alunos"></div>
      </div>
    </div>
  </div>

  <!-- BOTÃO -->
  <div class="card">
    <button class="btn-cadastrar" onclick="cadastrar()" id="btnCadastrar">✅ CADASTRAR</button>
    <div class="loading" id="loading">⏳ Enviando dados, aguarde...</div>
    <div class="msg" id="msg"></div>
  </div>

  <div class="footer">ℹ️ Preencha os dados de cada aluno na sua linha. Campos com * são obrigatórios.</div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzhiWg-94orW-B__luNZRkOzbt1fY-x-0tiawgHqIaTYvQE0ce83229q2jXglKguouQ/exec";

  const materiasNL1 = [
    "Cultura da Igreja","Disciplinas Espirituais","Evitando Ofensas",
    "Generosidade","Hábitos","Questão do Pecado","Uma Vida de Princípios"
  ];
  const materiasNL2 = [
    "Doutrinas Básicas","Enraizados","Lealdade e Deslealdade",
    "O Princípio da Honra","Planejados Para Agradar a Deus",
    "Semelhantes a Cristo","Uma Família para Pertencer"
  ];

  function atualizarMaterias() {
    const curso = document.getElementById("curso").value;
    const sel   = document.getElementById("materia");
    sel.innerHTML = '<option value="">Selecione...</option>';
    const lista = curso === "Next Level I" ? materiasNL1 : curso === "Next Level II" ? materiasNL2 : [];
    lista.forEach(m => { const o = document.createElement("option"); o.text = m; sel.add(o); });
  }

  function gerarLinhas() {
    const container = document.getElementById("lista-alunos");
    const hoje = new Date().toISOString().split("T")[0];
    for (let i = 1; i <= 30; i++) {
      const div = document.createElement("div");
      div.className = "aluno-row";
      div.innerHTML = `
        <input type="text" placeholder="Nome do aluno ${i}" id="nome_${i}" autocomplete="off" oninput="filtrarNomes(this)" onfocus="mostrarSugestoes(this)" onblur="esconderSugestoes(this)"><div class="sugestoes" id="sug_${i}"></div>
        <select id="aula1_${i}">
          <option value="">-</option>
          <option>Presente</option>
          <option>Ausente</option>
          <option>Justificado</option>
        </select>
        <select id="aula2_${i}">
          <option value="">-</option>
          <option>Presente</option>
          <option>Ausente</option>
          <option>Justificado</option>
        </select>
        <select id="aula3_${i}">
          <option value="">-</option>
          <option>Presente</option>
          <option>Ausente</option>
          <option>Justificado</option>
        </select>
        <select id="aula4_${i}">
          <option value="">-</option>
          <option>Presente</option>
          <option>Ausente</option>
          <option>Justificado</option>
        </select>
        <input type="number" placeholder="0.0" step="0.1" min="0" max="10" id="notaP_${i}">
      `;
      container.appendChild(div);
    }
  }

  function mostrarMsg(tipo, texto) {
    const el = document.getElementById("msg");
    el.className = "msg " + tipo;
    el.textContent = texto;
  }

  async function cadastrar() {
    const curso     = document.getElementById("curso").value;
    const materia   = document.getElementById("materia").value;
    const professor = document.getElementById("professor").value;
    const monitor   = document.getElementById("monitor").value;
    if (!curso || !materia || !professor) {
      mostrarMsg("error", "⚠️ Preencha Curso, Matéria e Professor antes de cadastrar.");
      return;
    }

    // Coletar alunos preenchidos
    const alunos = [];
    for (let i = 1; i <= 30; i++) {
      const nome = document.getElementById(`nome_${i}`).value.trim();
      if (nome) {
        alunos.push({
          nome,
          aula1: document.getElementById(`aula1_${i}`).value,
          aula2: document.getElementById(`aula2_${i}`).value,
          aula3: document.getElementById(`aula3_${i}`).value,
          aula4: document.getElementById(`aula4_${i}`).value,
          notaP: document.getElementById(`notaP_${i}`).value,
        });
      }
    }

    if (alunos.length === 0) {
      mostrarMsg("error", "⚠️ Informe ao menos um nome de aluno.");
      return;
    }

    const btn     = document.getElementById("btnCadastrar");
    const loading = document.getElementById("loading");
    btn.disabled           = true;
    loading.style.display  = "block";
    document.getElementById("msg").className = "msg";

    const ts     = new Date().toLocaleString("pt-BR");

    // Formatar data para DD/MM/YYYY
    function formatarData(dataISO) {
      if (!dataISO) return "";
      const [ano, mes, dia] = dataISO.split("-");
      return `${dia}/${mes}/${ano}`;
    }
    const sessao = "Sessao_" + Date.now();
    let erros    = 0;

    for (let idx = 0; idx < alunos.length; idx++) {
      const a = alunos[idx];
      const payload = {
        "Número":          idx + 1,
        "Timestamp":       ts,
        "Curso":           curso,
        "Matéria":         materia,
        "Professor":       professor,
        "Monitor":         monitor,
        "Nome do Aluno":   a.nome,
        "Presença":        a.presenca,
        "Nota Prova":      a.notaP    ? parseFloat(a.notaP)  : "",
        "Nota 2ª Chamada": a.nota2C   ? parseFloat(a.nota2C) : "",
        "Nota Trabalho":   a.notaT    ? parseFloat(a.notaT)  : "",
        "Data da Aula":    formatarData(a.data),
        "Sessão":          sessao
      };

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      } catch(e) {
        erros++;
      }
    }

    loading.style.display = "none";
    btn.disabled = false;

    if (erros === 0) {
      mostrarMsg("success", `✅ ${alunos.length} aluno(s) cadastrado(s) com sucesso!`);
      // Limpar apenas a tabela de alunos
      for (let i = 1; i <= 30; i++) {
        document.getElementById(`nome_${i}`).value  = "";
        document.getElementById(`aula1_${i}`).value = "";
        document.getElementById(`aula2_${i}`).value = "";
        document.getElementById(`aula3_${i}`).value = "";
        document.getElementById(`aula4_${i}`).value = "";
        document.getElementById(`notaP_${i}`).value = "";
      }
      // Limpar datas dos cabeçalhos
      document.getElementById("dataAula1").value = "";
      document.getElementById("dataAula2").value = "";
      document.getElementById("dataAula3").value = "";
      document.getElementById("dataAula4").value = "";
      // Resetar labels
      for (let n = 1; n <= 4; n++) {
        document.getElementById("hAula" + n).querySelector(".header-label").textContent = "Aula " + n;
      }
    } else {
      mostrarMsg("error", `⚠️ Erro ao enviar. Verifique a conexão e tente novamente.`);
    }
  }


  function atualizarHeaderAula(n) {
    const input = document.getElementById("dataAula" + n);
    const label = document.getElementById("hAula" + n).querySelector(".header-label");
    if (input.value) {
      const [ano, mes, dia] = input.value.split("-");
      label.textContent = dia + "/" + mes + "/" + ano;
    } else {
      label.textContent = "Aula " + n;
    }
  }

  function formatarData(dataISO) {
    if (!dataISO) return "";
    const [ano, mes, dia] = dataISO.split("-");
    return dia + "/" + mes + "/" + ano;
  }

  function filtrarNomes(input) {
    const termo = input.value.toLowerCase();
    const id = input.id.replace("nome_", "");
    const sug = document.getElementById("sug_" + id);
    sug.innerHTML = "";
    if (termo.length < 2) { sug.style.display = "none"; return; }
    const filtrados = listaNomes.filter(n => n.toLowerCase().includes(termo)).slice(0, 8);
    if (filtrados.length === 0) { sug.style.display = "none"; return; }
    filtrados.forEach(nome => {
      const div = document.createElement("div");
      div.textContent = nome;
      div.onmousedown = function() {
        input.value = nome;
        sug.style.display = "none";
      };
      sug.appendChild(div);
    });
    sug.style.display = "block";
  }

  function mostrarSugestoes(input) {
    if (input.value.length >= 2) filtrarNomes(input);
  }

  function esconderSugestoes(input) {
    setTimeout(() => {
      const id = input.id.replace("nome_", "");
      const sug = document.getElementById("sug_" + id);
      if (sug) sug.style.display = "none";
    }, 200);
  }

  // Inicializar
  gerarLinhas();
  // Data da Aula deve ser preenchida manualmente pelo professor
