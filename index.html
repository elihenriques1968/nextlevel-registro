<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Next Level - 2026</title>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 650px; }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #334155; }
        select, input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .info-panel { background: #eff6ff; border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; margin-top: 10px; }
        .warning { color: #dc2626; background: #fef2f2; padding: 10px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; display: none; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .btn:hover { background: var(--accent); }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .footer-alert { text-align: center; color: #dc2626; font-size: 0.9rem; font-weight: 600; background: #fff5f5; padding: 10px; border-radius: 8px; border: 1px dashed #fca5a5; }
        .gestor-area { margin-top: 30px; width: 100%; max-width: 650px; text-align: center; }
        .btn-gestor { background: none; border: 1px solid #cbd5e1; color: #64748b; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Ficha de Inscrição de Matérias - Next Level</h1>
    
    <form id="formMatricula">
        <div class="form-group">
            <label>Curso:</label>
            <select id="curso" onchange="validarCurso()">
                <option value="">Selecione o nível...</option>
                <option value="Next I">Next Level I</option>
                <option value="Next II">Next Level II</option>
            </select>
        </div>

        <div id="perguntaNextII" class="form-group hidden">
            <label>Você já concluiu todas as matérias do Next Level I?</label>
            <select id="concluiuI" onchange="carregarMaterias()">
                <option value="">Selecione...</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>

        <div id="alertaNivel" class="warning">⚠️ Você precisa escolher uma das matérias do Next Level I primeiro.</div>

        <div class="form-group">
            <label>Matéria Disponível:</label>
            <select id="materia" onchange="exibirDetalhesMateria()">
                <option value="">Selecione o curso primeiro...</option>
            </select>
        </div>

        <div id="detalhesMateria" class="info-panel hidden">
            <p><strong>Professor:</strong> <span id="txtProf">-</span></p>
            <p><strong>Horário:</strong> <span id="txtHora">-</span></p>
            <p><strong>Vagas Totais:</strong> <span id="txtVagas">-</span></p>
        </div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #e2e8f0;">

        <div class="form-group">
            <label>Nome do Aluno:</label>
            <input type="text" id="nomeAluno" list="listaSugestoes" oninput="preencherDadosAluno()" autocomplete="off" placeholder="Digite seu nome completo">
            <datalist id="listaSugestoes"></datalist>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Matrícula:</label>
                <input type="text" id="matricula" readonly style="background: #f1f5f9;">
            </div>
            <div class="form-group">
                <label>Telefone:</label>
                <input type="text" id="telefone">
            </div>
        </div>

        <div class="form-group">
            <label>Data de Nascimento:</label>
            <input type="text" id="nascimento" placeholder="dd/mm/aaaa">
        </div>

        <button type="button" id="btnConfirmar" class="btn" onclick="finalizarMatricula()">Confirmar Cadastro</button>
        
        <div class="footer-alert">
            ⚠️ Atenção: confira se todos os dados estão corretos antes de confirmar a inscrição.
        </div>
    </form>
</div>

<script>
    // --- BANCO DE DADOS INTEGRADO ---
    const dbAlunosRaw = `20260001;Adriana Menezes Braz;21981724733;21/02/1970
20260002;Adriane Couto Vieira De Almeida;21992851251;08/05/1991
20260003;Ágata Chrystian Farias Santa Vila;21990031081;15/04/2011
20260004;Alice Amaral;21976323518;25/05/2012
20260005;Alice Dias Pereira Santana;21992219579;07/08/2010
20260006;Aline Nascimento;21979511878;13/07/1992
20260007;Ana Beatriz Guedes Campos;;
20260008;Ana Claudia Gomes;21993365330;25/01/1988
20260009;Ana Paula De Andrade Ribeiro;;
20260010;Ana Paula Maria Da Silva;81983285105;17/05/1983
20260025;Creuza Maria Da Silva Campos;21973625112;04/05/1966
20260078;Luã Oliveira;21992741001;22/03/1990
20260125;Rodolpho Rocha;;`; // Exemplo reduzido, insira todos aqui.

    const dbMateriasFull = [
        { nome: "Cultura da Igreja", prof: "Profª. Rafaela Aragão", hora: "Domingos 08:10", total: 8, nivel: "Next I" },
        { nome: "Uma Vida de Princípios", prof: "Prof. Vanderlei Mello", hora: "Domingos 17:10", total: 8, nivel: "Next I" },
        { nome: "Evitando Ofensas", prof: "Profª. Priscilla Feiló", hora: "Quartas 20:00 (On-line)", total: 30, nivel: "Next II" },
        { nome: "O Princípio da Honra", prof: "Profª. Carol Segal", hora: "Domingos 08:10", total: 10, nivel: "Next II" },
        { nome: "Doutrinas Básicas", prof: "Prof. Fábio Côrtes", hora: "Domingos 08:10", total: 30, nivel: "Next I" },
        { nome: "Semelhantes à Cristo", prof: "Prof. Eli Henriques", hora: "Domingos 08:10", total: 30, nivel: "Next II" },
        { nome: "Enraizados", prof: "Profª. Euzinete Mota", hora: "Domingos 17:10", total: 10, nivel: "Next I" },
        { nome: "Lealdade e Deslealdade", prof: "Prof. Luã Oliveira", hora: "Domingos 17:10", total: 30, nivel: "Next II" },
        { nome: "Planejados Para Agradar a Deus", prof: "Profª. Deyse Feiló", hora: "Domingos 17:10", total: 30, nivel: "Next II" },
        { nome: "Uma Família para Pertencer", prof: "Profª Isabel Oliveira", hora: "Domingos 16:10", total: 30, nivel: "Next I" }
    ];

    let dbAlunos = {};

    window.onload = function() {
        const datalist = document.getElementById('listaSugestoes');
        dbAlunosRaw.split('\n').forEach(linha => {
            const r = linha.split(';');
            if(r[1]) {
                const nome = r[1].trim();
                dbAlunos[nome] = { mat: r[0], tel: r[2], nasc: r[3] };
                let opt = document.createElement('option');
                opt.value = nome;
                datalist.appendChild(opt);
            }
        });
    };

    function validarCurso() {
        const curso = document.getElementById('curso').value;
        document.getElementById('perguntaNextII').className = (curso === "Next II") ? "form-group" : "form-group hidden";
        carregarMaterias();
    }

    function carregarMaterias() {
        const curso = document.getElementById('curso').value;
        const concluiuI = document.getElementById('concluiuI').value;
        const select = document.getElementById('materia');
        const alerta = document.getElementById('alertaNivel');
        
        select.innerHTML = '<option value="">Selecione...</option>';
        alerta.style.display = "none";
        document.getElementById('detalhesMateria').classList.add('hidden');

        if (!curso) return;

        dbMateriasFull.forEach(info => {
            let mostrar = false;
            if (curso === "Next I" && info.nivel === "Next I") mostrar = true;
            if (curso === "Next II") {
                if (concluiuI === "nao" && info.nivel === "Next I") {
                    mostrar = true;
                    alerta.style.display = "block";
                } else if (concluiuI === "sim" && info.nivel === "Next II") {
                    mostrar = true;
                }
            }

            if (mostrar) {
                let opt = document.createElement('option');
                opt.value = info.nome;
                opt.textContent = info.nome;
                select.appendChild(opt);
            }
        });
    }

    function exibirDetalhesMateria() {
        const escolhida = document.getElementById('materia').value;
        const info = dbMateriasFull.find(m => m.nome === escolhida);
        const panel = document.getElementById('detalhesMateria');
        if(info) {
            panel.classList.remove('hidden');
            document.getElementById('txtProf').textContent = info.prof;
            document.getElementById('txtHora').textContent = info.hora;
            document.getElementById('txtVagas').textContent = info.total;
        } else {
            panel.classList.add('hidden');
        }
    }

    function preencherDadosAluno() {
        const nome = document.getElementById('nomeAluno').value.trim();
        if(dbAlunos[nome]) {
            document.getElementById('matricula').value = dbAlunos[nome].mat;
            document.getElementById('telefone').value = dbAlunos[nome].tel || "";
            document.getElementById('nascimento').value = dbAlunos[nome].nasc || "";
        } else {
            document.getElementById('matricula').value = nome !== "" ? "NOVO ALUNO" : "";
        }
    }

    function finalizarMatricula() {
    const dados = {
        curso: document.getElementById('curso').value,
        materia: document.getElementById('materia').value,
        nome: document.getElementById('nomeAluno').value,
        matricula: document.getElementById('matricula').value,
        telefone: document.getElementById('telefone').value,
        nascimento: document.getElementById('nascimento').value
    };

    if(!dados.curso || !dados.materia || !dados.nome) {
        alert("Por favor, preencha todos os campos obrigatórios.");
        return;
    }

    // Desativa o botão para evitar cliques duplos
    document.getElementById('btnConfirmar').disabled = true;
    document.getElementById('btnConfirmar').innerText = "Enviando...";

    // Chama a função do Apps Script
    google.script.run
        .withSuccessHandler(function(res) {
            alert(res);
            location.reload();
        })
        .withFailureHandler(function(err) {
            alert("Erro ao salvar: " + err);
            document.getElementById('btnConfirmar').disabled = false;
        })
        .processarInscricao(dados);
}
</script>
</body>
</html>
