<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Next Level - 2026</title>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 650px; }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #334155; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .info-panel { background: #eff6ff; border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; margin-top: 10px; }
        .warning { color: #dc2626; background: #fef2f2; padding: 10px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; display: none; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--accent); }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Ficha de Inscrição de Matérias - Next Level</h1>
    
    <form id="formMatricula">
        <div class="form-group">
            <label>Curso:</label>
            <select id="curso" onchange="validarCurso()">
                <option value="">Selecione o nível...</option>
                <option value="Next I">Next Level I</option>
                <option value="Next II">Next Level II</option>
            </select>
        </div>

        <div id="perguntaNextII" class="form-group hidden">
            <label>Você já concluiu todas as matérias do Next Level I?</label>
            <select id="concluiuI" onchange="carregarMaterias()">
                <option value="">Selecione...</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>

        <div id="alertaNivel" class="warning">⚠️ Você precisa escolher uma das matérias do Next Level I primeiro.</div>

        <div class="form-group">
            <label>Matéria Disponível:</label>
            <select id="materia" onchange="exibirDetalhesMateria()">
                <option value="">Selecione o curso primeiro...</option>
            </select>
        </div>

        <div id="detalhesMateria" class="info-panel hidden">
            <p><strong>Professor:</strong> <span id="txtProf">-</span></p>
            <p><strong>Horário:</strong> <span id="txtHora">-</span></p>
            <p><strong>Vagas Restantes:</strong> <span id="txtVagas">-</span></p>
        </div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #e2e8f0;">

        <div class="form-group">
            <label>Nome do Aluno:</label>
            <input type="text" id="nomeAluno" list="listaSugestoes" oninput="preencherDadosAluno()">
            <datalist id="listaSugestoes"></datalist>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Matrícula:</label>
                <input type="text" id="matricula" readonly style="background: #f1f5f9;">
            </div>
            <div class="form-group">
                <label>Telefone:</label>
                <input type="text" id="telefone" readonly style="background: #f1f5f9;">
            </div>
        </div>

        <div class="form-group">
            <label>Data de Nascimento:</label>
            <input type="text" id="nascimento" readonly style="background: #f1f5f9;">
        </div>

        <button type="button" id="btnConfirmar" class="btn" onclick="finalizarMatricula()">Confirmar Cadastro</button>
    </form>
</div>

    // --- LISTA DE MATÉRIAS EMBUTIDA ---
    const RAW_MATERIAS = `Cultura da Igreja;Profª. Rafaela Aragão;Domingos de 8:10 às 9:00 (Manhã - Presencial);8
Uma Vida de Princípios;Prof. Vanderlei Mello;Domingos de 17:10 às 18:00 (Tarde - Presencial);8
Evitando Ofensas;Profª. Priscilla Feiló;Quartas de 20:00 às 20:50 (Noite - On-line);30
O Princípio da Honra;Profª.Carol Segal;Domingos de 8:10 às 9:00 (Manhã - Presencial);10
Doutrinas Básicas;Prof. Fábio Côrtes;Domingos de 8:10 às 9:00 (Manhã - Presencial);30
Semelhantes à Cristo;Prof. Eli Henriquesde;Domingos de 8:10 às 9:00 (Manhã - Presencial);30
Enraizados;Profª. Euzinete Mota;Domingos de 17:10 às 18:00 (Tarde - Presencial);10
Lealdade e Deslealdade;Prof. Luã Oliveira;Domingos de 17:10 às 18:00 (Tarde - Presencial);30
Planejados Para Agradar a Deus;Profª. Deyse Feiló;Domingos de 17:10 às 18:00 (Tarde - Presencial);30
Uma Família para Pertencer;Profª Isabel Oliveira;Domingos de 16:10 às 17:00 (Tarde - Presencial);30`;

    let dbAlunos = {};
    let dbMateriasFull = [];
    let ocupacao = JSON.parse(localStorage.getItem('ocupacaoVagas')) || {};

    // Processar os dados embutidos ao carregar a página
    window.onload = function() {
        const datalist = document.getElementById('listaSugestoes');
        
        // Processar Alunos
        RAW_ALUNOS.split('\n').forEach(linha => {
            if(linha.includes(';')) {
                const [mat, nome, tel, nasc] = linha.split(';');
                dbAlunos[nome.trim()] = { mat, tel, nasc };
                let opt = document.createElement('option');
                opt.value = nome.trim();
                datalist.appendChild(opt);
            }
        });

        // Processar Matérias
        RAW_MATERIAS.split('\n').forEach(linha => {
            if(linha.includes(';')) {
                const [materia, prof, hora, vagas] = linha.split(';');
                dbMateriasFull.push({ nome: materia.trim(), prof, hora, total: parseInt(vagas) });
            }
        });
    };

    function validarCurso() {
        const curso = document.getElementById('curso').value;
        document.getElementById('perguntaNextII').className = (curso === "Next II") ? "form-group" : "form-group hidden";
        carregarMaterias();
    }

    function carregarMaterias() {
        const curso = document.getElementById('curso').value;
        const concluiuI = document.getElementById('concluiuI').value;
        const select = document.getElementById('materia');
        const alerta = document.getElementById('alertaNivel');
        select.innerHTML = '<option value="">Selecione...</option>';
        alerta.style.display = "none";

        if (!curso) return;

        let listaFiltro = [];
        if (curso === "Next I" || (curso === "Next II" && concluiuI === "nao")) {
            if(curso === "Next II") alerta.style.display = "block";
            listaFiltro = ["Cultura da Igreja", "Uma Vida de Princípios", "Evitando Ofensas", "Do Egoísmo à Generosidade", "Disciplinas Espiritual", "Hábitos e Questão do Pecado"];
        } else if (curso === "Next II" && concluiuI === "sim") {
            listaFiltro = ["Doutrinas Básicas", "Semelhantes à Cristo", "Enraizados", "Lealdade e Deslealdade", "O Princípio da Honra", "Uma Família para Pertencer", "Planejados Para Agradar a Deus"];
        }

        let materiasDisponiveis = 0;
        listaFiltro.forEach(m => {
            const info = dbMateriasFull.find(item => item.nome === m);
            const jaInscritos = ocupacao[m] || 0;
            if(info && jaInscritos < info.total) {
                let opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m + ` (${info.total - jaInscritos} vagas)`;
                select.appendChild(opt);
                materiasDisponiveis++;
            }
        });

        if (listaFiltro.length > 0 && materiasDisponiveis === 0) {
            select.innerHTML = '<option value="">Não há mais vaga para esse curso.</option>';
        }
    }

    function exibirDetalhesMateria() {
        const escolhida = document.getElementById('materia').value;
        const info = dbMateriasFull.find(m => m.nome === escolhida);
        const panel = document.getElementById('detalhesMateria');
        if(info) {
            panel.classList.remove('hidden');
            document.getElementById('txtProf').textContent = info.prof;
            document.getElementById('txtHora').textContent = info.hora;
            document.getElementById('txtVagas').textContent = info.total - (ocupacao[escolhida] || 0);
        } else {
            panel.classList.add('hidden');
        }
    }

    function preencherDadosAluno() {
        const nome = document.getElementById('nomeAluno').value;
        if(dbAlunos[nome]) {
            document.getElementById('matricula').value = dbAlunos[nome].mat;
            document.getElementById('telefone').value = dbAlunos[nome].tel || "Não informado";
            document.getElementById('nascimento').value = dbAlunos[nome].nasc || "Não informado";
        }
    }

    function finalizarMatricula() {
        const btn = document.getElementById('btnConfirmar');
        const materia = document.getElementById('materia').value;
        const nome = document.getElementById('nomeAluno').value;

        if(!materia || !nome) return alert("Por favor, selecione seu nome e a matéria!");

        btn.disabled = true;
        btn.innerText = "Enviando...";

        const dados = {
            protocolo: "NL-" + Date.now().toString().slice(-6),
            curso: document.getElementById('curso').value,
            materia: materia,
            professor: document.getElementById('txtProf').textContent,
            nome: nome,
            matricula: document.getElementById('matricula').value,
            telefone: document.getElementById('telefone').value,
            nascimento: document.getElementById('nascimento').value
        };

        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwK64uVjmMrj9KnRsJ_SJ-p_25_MfcfmTmyGQ6cvI5AyGnCROkooS9iPeF88GCWbjAVdQ/exec";

        fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(dados) })
        .then(() => {
            ocupacao[materia] = (ocupacao[materia] || 0) + 1;
            localStorage.setItem('ocupacaoVagas', JSON.stringify(ocupacao));
            
            alert("Sucesso! Protocolo: " + dados.protocolo);

            // Limpeza
            document.getElementById('nomeAluno').value = "";
            document.getElementById('matricula').value = "";
            document.getElementById('telefone').value = "";
            document.getElementById('nascimento').value = "";
            document.getElementById('detalhesMateria').classList.add('hidden');
            carregarMaterias(); 
            
            btn.disabled = false;
            btn.innerText = "Confirmar Cadastro";
        })
        .catch(() => {
            alert("Erro ao salvar dados.");
            btn.disabled = false;
            btn.innerText = "Confirmar Cadastro";
        });
    }
