<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Next Level - 2026</title>
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 650px; }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #334155; }
        select, input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .info-panel { background: #eff6ff; border-left: 4px solid var(--accent); padding: 15px; border-radius: 4px; margin-top: 10px; }
        .warning { color: #dc2626; background: #fef2f2; padding: 10px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; display: none; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .btn:hover { background: var(--accent); }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .footer-alert { text-align: center; color: #dc2626; font-size: 0.9rem; font-weight: 600; background: #fff5f5; padding: 10px; border-radius: 8px; border: 1px dashed #fca5a5; }
        .gestor-area { margin-top: 30px; width: 100%; max-width: 650px; text-align: center; }
        .btn-gestor { background: none; border: 1px solid #cbd5e1; color: #64748b; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .hidden { display: none; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">Sincronizando vagas...</div>

<div class="card">
    <h1>Ficha de Inscrição de Matérias - Next Level</h1>
    
    <form id="formMatricula">
        <div class="form-group">
            <label>Curso:</label>
            <select id="curso" onchange="validarCurso()">
                <option value="">Selecione o nível...</option>
                <option value="Next I">Next Level I</option>
                <option value="Next II">Next Level II</option>
            </select>
        </div>

        <div id="perguntaNextII" class="form-group hidden">
            <label>Você já concluiu todas as matérias do Next Level I?</label>
            <select id="concluiuI" onchange="carregarMaterias()">
                <option value="">Selecione...</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>
        </div>

        <div id="alertaNivel" class="warning">⚠️ Você precisa escolher uma das matérias do Next Level I primeiro.</div>

        <div class="form-group">
            <label>Matéria Disponível:</label>
            <select id="materia" onchange="exibirDetalhesMateria()">
                <option value="">Selecione o curso primeiro...</option>
            </select>
        </div>

        <div id="detalhesMateria" class="info-panel hidden">
            <p><strong>Professor:</strong> <span id="txtProf">-</span></p>
            <p><strong>Horário:</strong> <span id="txtHora">-</span></p>
            <p><strong>Vagas Restantes:</strong> <span id="txtVagas">-</span></p>
        </div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #e2e8f0;">

        <div class="form-group">
            <label>Nome do Aluno:</label>
            <input type="text" id="nomeAluno" list="listaSugestoes" oninput="preencherDadosAluno()">
            <datalist id="listaSugestoes"></datalist>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>Matrícula:</label>
                <input type="text" id="matricula" readonly style="background: #f1f5f9;">
            </div>
            <div class="form-group">
                <label>Telefone:</label>
                <input type="text" id="telefone">
            </div>
        </div>

        <div class="form-group">
            <label>Data de Nascimento:</label>
            <input type="text" id="nascimento" placeholder="dd/mm/aaaa">
        </div>

        <button type="button" id="btnConfirmar" class="btn" onclick="finalizarMatricula()">Confirmar Cadastro</button>
        
        <div class="footer-alert">
            ⚠️ Atenção: confira se todos os dados estão corretos antes de confirmar a inscrição.
        </div>
    </form>
</div>

<div class="gestor-area">
    <button class="btn-gestor" onclick="window.open('https://docs.google.com/spreadsheets/d/SEU_ID_DA_PLANILHA_AQUI/edit')">📂 Abrir Área do Gestor (Planilha)</button>
</div>

<script>
    const URL_SCRIPT = "COLE_AQUI_A_NOVA_URL_DO_APP_SCRIPT";

    let dbAlunos = {};
    let dbMateriasFull = [];
    let ocupacaoReal = {};

    window.onload = async function() {
        try {
            const response = await fetch(URL_SCRIPT);
            const data = await response.json();
            
            // Mapear Alunos
            const datalist = document.getElementById('listaSugestoes');
            data.alunos.slice(1).forEach(r => {
                dbAlunos[r[1].trim()] = { mat: r[0], tel: r[2], nasc: r[3] };
                let opt = document.createElement('option');
                opt.value = r[1].trim();
                datalist.appendChild(opt);
            });

            // Mapear Matérias
            data.materias.slice(1).forEach(r => {
                dbMateriasFull.push({ nome: r[0].trim(), prof: r[1], hora: r[2], total: parseInt(r[3]), nivel: r[4] });
            });

            ocupacaoReal = data.ocupacao;
            document.getElementById('loader').classList.add('hidden');
        } catch (e) {
            alert("Erro ao carregar dados do servidor. Verifique a URL do Script.");
        }
    };

    function validarCurso() {
        const curso = document.getElementById('curso').value;
        document.getElementById('perguntaNextII').className = (curso === "Next II") ? "form-group" : "form-group hidden";
        carregarMaterias();
    }

    function carregarMaterias() {
        const curso = document.getElementById('curso').value;
        const concluiuI = document.getElementById('concluiuI').value;
        const select = document.getElementById('materia');
        const alerta = document.getElementById('alertaNivel');
        select.innerHTML = '<option value="">Selecione...</option>';
        alerta.style.display = "none";

        if (!curso) return;

        dbMateriasFull.forEach(info => {
            let mostrar = false;
            if (curso === "Next I" && info.nivel === "Next I") mostrar = true;
            if (curso === "Next II" && concluiuI === "nao" && info.nivel === "Next I") {
                mostrar = true;
                alerta.style.display = "block";
            }
            if (curso === "Next II" && concluiuI === "sim" && info.nivel === "Next II") mostrar = true;

            const jaInscritos = ocupacaoReal[info.nome] || 0;
            if (mostrar && jaInscritos < info.total) {
                let opt = document.createElement('option');
                opt.value = info.nome;
                opt.textContent = `${info.nome} (${info.total - jaInscritos} vagas)`;
                select.appendChild(opt);
            }
        });
    }

    function exibirDetalhesMateria() {
        const escolhida = document.getElementById('materia').value;
        const info = dbMateriasFull.find(m => m.nome === escolhida);
        const panel = document.getElementById('detalhesMateria');
        if(info) {
            panel.classList.remove('hidden');
            document.getElementById('txtProf').textContent = info.prof;
            document.getElementById('txtHora').textContent = info.hora;
            document.getElementById('txtVagas').textContent = info.total - (ocupacaoReal[escolhida] || 0);
        } else {
            panel.classList.add('hidden');
        }
    }

    function preencherDadosAluno() {
        const nome = document.getElementById('nomeAluno').value.trim();
        const matField = document.getElementById('matricula');
        if(dbAlunos[nome]) {
            matField.value = dbAlunos[nome].mat;
            document.getElementById('telefone').value = dbAlunos[nome].tel || "";
            document.getElementById('nascimento').value = dbAlunos[nome].nasc || "";
        } else {
            matField.value = nome !== "" ? "NOVO ALUNO" : "";
        }
    }

    async function finalizarMatricula() {
        const btn = document.getElementById('btnConfirmar');
        const materia = document.getElementById('materia').value;
        const nome = document.getElementById('nomeAluno').value;

        if(!materia || !nome) return alert("Preencha todos os campos!");

        btn.disabled = true;
        btn.innerText = "Registrando...";

        const dados = {
            protocolo: "NL-" + Date.now().toString().slice(-6),
            curso: document.getElementById('curso').value,
            materia: materia,
            professor: document.getElementById('txtProf').textContent,
            nome: nome,
            matricula: document.getElementById('matricula').value,
            telefone: document.getElementById('telefone').value,
            nascimento: document.getElementById('nascimento').value
        };

        try {
            await fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify(dados) });
            alert("Inscrição confirmada! Protocolo: " + dados.protocolo);
            location.reload();
        } catch (e) {
            alert("Erro ao salvar.");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
