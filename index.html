<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Matrícula - Next Level</title>
    <style>
        :root { --primary: #0047ab; --secondary: #f4f4f4; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--secondary); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .info-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; border-left: 5px solid var(--primary); }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #config-panel { margin-top: 30px; border-top: 1px solid #ddd; padding-top: 10px; font-size: 12px; color: #999; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Matrícula Next Level</h2>

    <div class="form-group">
        <label>Curso</label>
        <select id="curso">
            <option value="Next Level I">Next Level I</option>
            <option value="Next Level II">Next Level II</option>
        </select>
    </div>

    <div class="form-group">
        <label>Matéria Desejada</label>
        <select id="materia" onchange="atualizarMateria()">
            <option value="">Selecione uma matéria...</option>
        </select>
    </div>

    <div id="infoMateria" class="info-box">
        <strong>Professor:</strong> <span id="txtProf"></span><br>
        <strong>Horário:</strong> <span id="txtHora"></span><br>
        <strong>Vagas:</strong> <span id="txtVagas"></span>
    </div>

    <div class="form-group" style="margin-top: 20px;">
        <label>Nome Completo do Aluno</label>
        <input type="text" id="nomeAluno" list="listaAlunos" oninput="buscarDadosAluno()" placeholder="Comece a digitar o nome...">
        <datalist id="listaAlunos"></datalist>
    </div>

    <div id="infoAluno" class="info-box">
        <strong>Matrícula:</strong> <span id="txtMatricula"></span><br>
        <strong>Telefone:</strong> <span id="txtTel"></span><br>
        <strong>Data de Nascimento:</strong> <span id="txtNasc"></span>
    </div>

    <!-- Campos Ocultos para envio -->
    <input type="hidden" id="matricula">
    <input type="hidden" id="telefone">
    <input type="hidden" id="nascimento">

    <button class="btn" onclick="finalizarMatricula()">Confirmar Cadastro</button>

    <div id="config-panel" onclick="abrirConfig()">⚙️ Painel do Gestor</div>
</div>

<script>
    // LINKS DE CONFIGURAÇÃO (LOCAIS)
    let dbAlunos = localStorage.getItem('dbAlunos') || "";
    let dbMaterias = localStorage.getItem('dbMaterias') || "";

    function atualizarListas() {
        const datalist = document.getElementById('listaAlunos');
        datalist.innerHTML = dbAlunos.split('\n').map(linha => {
            const nome = linha.split(';')[1];
            return nome ? `<option value="${nome}">` : '';
        }).join('');

        const selectMat = document.getElementById('materia');
        selectMat.innerHTML = '<option value="">Selecione uma matéria...</option>' + 
            dbMaterias.split('\n').map(linha => {
                const mat = linha.split(';')[0];
                return mat ? `<option value="${mat}">${mat}</option>` : '';
            }).join('');
    }

    function atualizarMateria() {
        const matSel = document.getElementById('materia').value;
        const info = dbMaterias.split('\n').find(l => l.startsWith(matSel));
        if (info) {
            const dados = info.split(';');
            document.getElementById('txtProf').innerText = dados[1];
            document.getElementById('txtHora').innerText = dados[2];
            document.getElementById('txtVagas').innerText = dados[3];
            document.getElementById('infoMateria').style.display = 'block';
        }
    }

    function buscarDadosAluno() {
        const nomeSel = document.getElementById('nomeAluno').value;
        const info = dbAlunos.split('\n').find(l => l.split(';')[1] === nomeSel);
        if (info) {
            const dados = info.split(';');
            document.getElementById('txtMatricula').innerText = dados[0];
            document.getElementById('txtTel').innerText = dados[2];
            document.getElementById('txtNasc').innerText = dados[3];
            
            document.getElementById('matricula').value = dados[0];
            document.getElementById('telefone').value = dados[2];
            document.getElementById('nascimento').value = dados[3];
            
            document.getElementById('infoAluno').style.display = 'block';
        }
    }

    function finalizarMatricula() {
        const btn = document.querySelector('.btn');
        if(!document.getElementById('matricula').value) return alert("Selecione um aluno válido!");
        
        btn.disabled = true;
        btn.innerText = "Gravando na Planilha...";

        const dados = {
            protocolo: "NL-" + Math.floor(Math.random() * 1000000),
            curso: document.getElementById('curso').value,
            materia: document.getElementById('materia').value,
            professor: document.getElementById('txtProf').innerText,
            nome: document.getElementById('nomeAluno').value,
            matricula: document.getElementById('matricula').value,
            telefone: document.getElementById('telefone').value,
            nascimento: document.getElementById('nascimento').value
        };

        // URL DO SEU GOOGLE SCRIPT (IMPLEMENTADA)
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwK64uVjmMrj9KnRsJ_SJ-p_25_MfcfmTmyGQ6cvI5AyGnCROkooS9iPeF88GCWbjAVdQ/exec";

        fetch(URL_SCRIPT, {
            method: 'POST',
            body: JSON.stringify(dados)
        })
        .then(res => {
            alert("Sucesso! Matrícula confirmada.\nProtocolo: " + dados.protocolo);
            window.location.reload();
        })
        .catch(err => {
            alert("Erro ao salvar dados.");
            btn.disabled = false;
            btn.innerText = "Confirmar Cadastro";
        });
    }

    function abrirConfig() {
        const senha = prompt("Senha do Gestor:");
        if (senha === "1234") {
            const nAlunos = prompt("Cole os dados dos Alunos (Matrícula;Nome;Telefone;Nascimento):", dbAlunos);
            if (nAlunos) localStorage.setItem('dbAlunos', nAlunos);
            const nMats = prompt("Cole os dados das Matérias (Matéria;Professor;Horário;Vagas):", dbMaterias);
            if (nMats) localStorage.setItem('dbMaterias', nMats);
            window.location.reload();
        }
    }

    atualizarListas();
</script>

</body>
</html>
